name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.4). Leave blank for manual smoke build."
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            bin: ferrumdb
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            bin: ferrumdb.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }} -p ferrumdb-cli

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.bin }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Linux tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE=ferrumdb-cli-${{ steps.ver.outputs.version }}-${{ matrix.target }}
          mkdir "$STAGE"
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} "$STAGE/"
          cp README.md LICENSE "$STAGE/" || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          echo "ASSET=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "ferrumdb-cli-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" -Destination $stage
          if (Test-Path README.md) { Copy-Item README.md $stage }
          if (Test-Path LICENSE)   { Copy-Item LICENSE   $stage }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ASSET=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
